name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to GCP
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@34.18.23.219 "
            cd /var/www/exa-engineering &&
            git pull origin main &&
            npm ci &&
            npm run build &&
            sudo systemctl restart exa-engineering
          "
