name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GCP
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: 34.18.23.219
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/exa-engineering
            git pull origin main
            npm ci
            npm run build
            sudo systemctl restart exa-engineering
