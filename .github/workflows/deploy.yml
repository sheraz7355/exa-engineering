name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: ssh-keyscan -H 34.18.23.219 >> ~/.ssh/known_hosts

      - name: Deploy to GCP
        run: |
          ssh ubuntu@34.18.23.219 "
            cd /var/www/exa-engineering &&
            git pull origin main &&
            npm ci &&
            npm run build &&
            sudo systemctl restart exa-engineering
          "
